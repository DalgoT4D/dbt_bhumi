        description: Partner type classification (Projected, UnMatched, Matched, CSR Partner)
      - name: fy
        description: Financial year (April–March cycle, e.g. 2025-2026)
      - name: quarter
        description: Quarter within FY (Q1=Apr-Jun, Q2=Jul-Sep, Q3=Oct-Dec, Q4=Jan-Mar)
      - name: partner_events_so_far_in_fy
        description: Running count of events for this partner in the current FY up to this row
      - name: is_active_partner
        description: Whether the partner is active (contributed at least 1 event in this FY)
      - name: is_recurring_partner
        description: Whether the partner had already run an event in this FY before this event
